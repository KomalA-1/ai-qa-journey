# .github\workflows\playwright.yml

name: Playwright Tests

on:
  push:
    branches: [main]
  pull-resquest:
    branches:[main]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'
        
      - name: Install dependencies
        run: |
          pip install pytest playwright pytest-playwright faker requests

      - name: Install Playwright browsers
        run: playwright install --with-deps chromium

      - name: Run Playwright tests
        run: |
          cd playwright-tests
          pytest test_day20.py test_day22.py -v --browser chromium